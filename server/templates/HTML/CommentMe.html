                <p>• 不喜欢聊政治话题，本人语文不太好，用词不太美观，请见谅</p>

<script>
    function SendMsgByContact(msg) {
        const PageWindow = document.getElementById("PageWindow");
        PageWindow.style.display = 'flex';
        PageWindow.innerHTML = `
            <div class="page-window-overlay" onclick="closePageWindow()"></div>
            <div class="page-window-box" id="page-window-box-all">
                <button class="page-window-close" onclick="closePageWindow()">×</button>
                <h2 class="page-window-title">请复制提示</h2>
                <p id="page-window-box-text">${msg}</p>
                <p id="page-window-box-title">请复制该信息进行联系喵～</p>
                <button onclick="CopyText(${msg})">点击复制</button>
            </div>
        `;
    }

    // 传入字符串参数，一键复制
    async function CopyText(text) {
        try {
            navigator.clipboard.writeText(text)
                .then(() => console.log('Copy True'))
                .catch(err => console.error('Copy Error:', err));
        } catch (e) {
            console.error('Copy Error For 1:', e)
            try {
                await navigator.clipboard.writeText(text);
                console.log('Copy True')
            } catch (e) {
                console.error('Copy Error For 2:', e)
                // 降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.cssText = 'position:fixed;opacity:0';
                document.body.appendChild(textarea);
                textarea.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(textarea);
                return ok;
            }

        }
    }

    function closePageWindow() {
        const PageWindow = document.getElementById("PageWindow");
        PageWindow.innerHTML = '';
        PageWindow.style.display = 'none';
    }

    function SendContactMessage() {
        const name = document.getElementById('ContactFormName').value.trim();
        const contact = document.getElementById('ContactFormContact').value.trim();
        const message = document.getElementById('ContactFormMessage').value.trim();
        const tip = document.getElementById('ContactFormTip');
        const submitBtn = document.getElementById('ContactFormSubmit');

        if (!contact) {
            tip.textContent = '请填写联系方式';
            tip.className = 'contact-form-tip error';
            return;
        }
        if (!message) {
            tip.textContent = '请填写留言内容';
            tip.className = 'contact-form-tip error';
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '发送中…';
        tip.textContent = '';
        tip.className = 'contact-form-tip';

        const senderName = name || '匿名访客';
        fetch('https://api.crazying-dev.top/SendEmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                to: '3890320020@qq.com',
                subject: `【留言】来自 ${senderName}`,
                message: `称呼：${senderName}\n联系方式：${contact}\n\n留言内容：\n${message}`
            })
        })
        .then(res => {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(data => {
            console.log("Send Message:"+"\n"+data)
            tip.textContent = '发送成功！感谢你的留言喵～';
            tip.className = 'contact-form-tip success';
            submitBtn.textContent = '已发送';
            document.getElementById('ContactFormName').value = '';
            document.getElementById('ContactFormContact').value = '';
            document.getElementById('ContactFormMessage').value = '';
            setTimeout(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = '发送消息';
            }, 3000);
        })
        .catch(err => {
            console.error('发送失败', err);
            tip.textContent = '发送失败，请稍后重试或直接联系我的邮箱';
            tip.className = 'contact-form-tip error';
            submitBtn.disabled = false;
            submitBtn.textContent = '重新发送';
        });
    }
</script>
