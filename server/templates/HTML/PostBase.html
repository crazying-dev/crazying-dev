<div id="PostHead">
    <p id="PostTitle"></p>
    <div class="post-meta">
        <div id="PostAvter"><img id="PostAvterImg" alt="avatar"></div>
        <p id="PostAuto"></p>
        <span class="post-sep">·</span>
        <p id="PostDate"></p>
    </div>
</div>

<hr id="PostDivider">

<div id="PostText">
</div>

<script>
    const url = window.location.href;
    const match = url.match(/\/post\/(\d+)/);
    let id = null;
    if (match) {
        id = Number(match[1]);
    }
    let PostInfoFrom = `https://api.crazying-dev.top/post/${id}`
    fetch(PostInfoFrom)
        .then(res => {
            if (!res.ok) {
                throw new Error("HTTP " + res.status);
            }
            return res.json();
        })
        .then(
            dict => {
                console.log("Get dict", dict);
                document.getElementById("PostAuto").innerText = dict["auto"] || "";
                document.getElementById("PostTitle").innerText = dict["title"] || "";
                document.getElementById("PostDate").innerText = dict["date"] || "";
                document.getElementById("PostText").innerHTML = dict["text"] || "";
                const avter = dict["avter"];
                const avterImg = document.getElementById("PostAvterImg");
                if (avter) {
                    let src = avter;
                    if (src && !/^(https?:)?\/\//i.test(src)) {
                        src = "//" + src;
                    }
                    avterImg.src = src;
                }
            }
        )
        .catch(err => {
            console.error("Post fetch error", err);
            document.getElementById("PostTitle").innerText = "加载失败";
            document.getElementById("PostText").innerText = "文章信息获取失败：" + err;
        })
</script>
