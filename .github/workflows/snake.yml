name: Generate GitHub Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      # 创建 snake 文件夹（不存在则自动创建）
      - name: Create snake directory
        run: mkdir -p snake

      # 生成 SVG 到 snake/ 文件夹
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            snake/github-contribution-grid-snake.svg
            snake/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 提交更新到 main 分支
      - name: Commit and push to main
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update snake animation"
          committer_name: GitHub Actions
          committer_email: actions@github.com