    <script>
        // 双背景图 自动备用图源
        const bgList = {
            pc: [
                "/bg?type=pc",                             // 来自服务器
                "https://img.hk256.top/random?t=webp&o=h",
                "https://api.rls.icu/horizontal",
                "https://random.moejue.cn/randbg?type=pc"
            ],
            mobile: [
                "/bg?type=mobile",                        // 来自服务器
                "https://img.hk256.top/random?t=webp&o=v",
                "https://api.rls.icu/vertical",
                "https://api.sretna.cn/mobile"
            ]
        };

        // 加载图片并失败自动重试
        function loadImage(urls, element) {
            let index = 0;
            function tryLoad() {
                if (index >= urls.length) return;
                const img = new Image();
                img.src = urls[index];
                img.onload = () => {
                    element.style.backgroundImage = `url(${urls[index]})`;
                };
                img.onerror = () => {
                    index++;
                    tryLoad();
                };
            }
            tryLoad();
        }

        // 初始化两个背景层
        window.addEventListener('load', () => {
            const bg1 = document.querySelector('.bg-box-for1');
            const bg2 = document.querySelector('.bg-box-for2');
            loadImage(bgList.pc, bg1);
            loadImage(bgList.mobile, bg2);
        });
    </script>

<!-- 页面内容获取 -->
<script>
    // 功能：获取当前URL → 拼接GET → 请求HTML → 渲染到 #ui 组件
    function loadGetHtml() {
        // 1. 获取当前页面 URL
        let baseUrl = window.location.href;

        // 处理末尾斜杠，避免重复
        if (baseUrl.endsWith('/')) {
            baseUrl = baseUrl.slice(0, -1);
        }

        // 2. 在 URL 后面加上 /GET
        const targetUrl = baseUrl + '/GET';

        // 3. 请求并把返回的 HTML 加载到 id="ui" 的元素中
        fetch(targetUrl)
            .then(res => res.text())
            .then(html => {
                const uiContainer = document.getElementById('ui');
                if (uiContainer) {
                    uiContainer.innerHTML = html;
                }
            })
            .catch(err => {
                console.error('加载GET页面失败：', err);
            });
    }

    // 页面加载后自动执行
    // window.onload = function() {
    //     loadGetHtml();
    // };
    loadGetHtml();
</script>

    <script>
        // ==========================
        // 模型列表（100% 可用 JSON）

                name: "春 Haru",

            },
            {
                name: "初音 Miku",
                url: "https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/miku/model.json"
            },
            {
                name: "Kizuna AI",
                url: "https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/kizuna/model.json"
            },
            {
                name: "Konata",
                url: "https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/konata/model.json"
            },
            {
                name: "Chitanda",
                url: "https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/chitanda/model.json"
            },
            {
                name: "Keqing",
                url: "https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/keqing/model.json"
            },
            {
                name: "Paimon",
                url: "https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/paimon/model.json"
            },
            {
                name: "Ganyu",
                url: "https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/ganyu/model.json"
            },
            {
                name: "HuTao",
                url: "https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/hutao/model.json"
            }
        ];

        // ==========================
        // 工具函数
        // ==========================
        String.prototype.render = function (context) {
            return this.replace(/\{([^}]+)\}/g, (_, key) => context[key] || '');
        };

        function showMessage(text, timeout = 5000, force = false) {
            if (force || !sessionStorage.getItem('waifu-msg')) {
                if (Array.isArray(text)) text = text[Math.random() * text.length | 0];
                if (force) sessionStorage.setItem('waifu-msg', text);
                $('.waifu-tips').html(text).fadeTo(200, 1);
                setTimeout(() => {
                    sessionStorage.removeItem('waifu-msg');
                    $('.waifu-tips').fadeTo(200, 0);
                }, timeout);
            }
        }

        // ==========================
        // 加载模型
        // ==========================
        let currentModelIndex = 0;
        function loadModel(url) {
            window.L2Dwidget.init({
                model: { jsonPath: url },
                display: { position: "left", width: 200, height: 300 },
                mobile: { show: false }
            });
            showMessage("加载成功！", 2000, true);
        }

        // ==========================
        // 切换下一个模型
        // ==========================
        function nextModel() {
            currentModelIndex = (currentModelIndex + 1) % LIVE2D_MODELS.length;
            const m = LIVE2D_MODELS[currentModelIndex];
            loadModel(m.url);
            showMessage(`切换：${m.name}`, 3000, true);
        }

        // ==========================
        // 初始化
        // ==========================
        $(function() {
            loadModel(LIVE2D_MODELS[0].url);
            $('.waifu-tool .fui-eye').click(nextModel);

            // 欢迎语
            const hour = new Date().getHours();
            const welcome = hour < 6 ? '熬夜对身体不好哦' :
                hour < 12 ? '早上好！' :
                    hour < 18 ? '下午好呀' : '晚上好～';
            showMessage(welcome, 4000);
        });
    </script>
