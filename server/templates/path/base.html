<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡里的窝</title>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="stylesheet" href="/static/CSS/body.css">
    <link rel="stylesheet" href="/static/CSS/all.css">

    <script>
        // 双背景图 自动备用图源
        const bgList = {
            pc: [
                "/bg?type=pc",                             // 来自服务器
                "https://img.hk256.top/random?t=webp&o=h",
                "https://api.rls.icu/horizontal",
                "https://random.moejue.cn/randbg?type=pc"
            ],
            mobile: [
                "/bg?type=mobile",                        // 来自服务器
                "https://img.hk256.top/random?t=webp&o=v",
                "https://api.rls.icu/vertical",
                "https://api.sretna.cn/mobile"
            ]
        };

        // 加载图片并失败自动重试
        function loadImage(urls, element) {
            let index = 0;
            function tryLoad() {
                if (index >= urls.length) return;
                const img = new Image();
                img.src = urls[index];
                img.onload = () => {
                    element.style.backgroundImage = `url(${urls[index]})`;
                };
                img.onerror = () => {
                    index++;
                    tryLoad();
                };
            }
            tryLoad();
        }

    </script>

</head>
<body>
<!-- 背景图混合 -->
<div class="bg-box-for1 bg-box"></div>
<div class="bg-box-for2 bg-box"></div>

<!-- 提示栏 -->
<div class="card" from="Go-to-Github">前往GitHub</div>
<div class="card" from="AboutMeForHeader">emm...来让我做一下自我介绍吧</div>
<div class="card" from="WorkWithMe">来看看还有那些神经病陪我发疯</div>
<div class="card" from="Thanks">看看这个小站收到了那些人的赞助</div>
<div class="card" from="CommentMe">联系我</div>
<div class="card" from="friend">我的朋友</div>
<div class="card" from="title">卡里の窝</div>

<!-- 头 -->
<header>
    <a href="https://github.com/crazying-dev" id="Go-to-Github">
        <img src="/static/img/me.png" alt="This is me Github Avatar" id="me">
    </a>
    <a href="/AboutMe" class="HeaderButton" id="AboutMeForHeader">关于我</a>
    <a href="/HTML/WorkWithMe.html" class="HeaderButton" id="WorkWithMe">协作者</a>
    <a href="/HTML/Thanks.html" class="HeaderButton" id="Thanks">鸣谢</a>
    <a href="/HTML/CommentMe.html" class="HeaderButton" id="CommentMe">联系我</a>
    <a href="/HTML/friend.html" class="HeaderButton" id="friend">友人</a>

<!-- <img src="https://count.getloli.com/@A?name=A&theme=sketch-2&padding=3&offset=0&align=top&scale=1&pixelated=1&darkmode=auto" alt="计数器"> -->


<div id="ui"></div>


<!-- 页面内容获取 -->
<script>
    function loadGetHtml() {
        let baseUrl = window.location.href;
        if (baseUrl.endsWith('/')) {
            baseUrl = baseUrl.slice(0, -1);
        }
        const targetUrl = baseUrl + '/GET';
        return fetch(targetUrl)
            .then(res => res.text())
            .then(html => {
                const uiContainer = document.getElementById('ui');
                if (!uiContainer) return;

                // 先清空
                uiContainer.innerHTML = '';

                // 创建临时容器
                const temp = document.createElement('div');
                temp.innerHTML = html;

                // 把所有节点挪进去，并自动执行script
                const arr = Array.from(temp.childNodes);
                arr.forEach(node => {
                    // 如果是script标签，手动创建新script执行
                    if(node.tagName === 'SCRIPT'){
                        let s = document.createElement('script');
                        // 复制属性
                        Array.from(node.attributes).forEach(attr=>{
                            s.setAttribute(attr.name, attr.value);
                        });
                        // 复制脚本内容
                        s.textContent = node.textContent;
                        uiContainer.appendChild(s);
                    }else{
                        uiContainer.appendChild(node);
                    }
                });

                // 初始化卡片
                if (window.initCards) {
                    window.initCards();
                }
            })
            .catch(err => {
                console.error('加载GET页面失败：', err);
            });
    }
</script>

<!-- 定义window的大小更改时的组件更改 -->
<script src="/static/JS/window.js"></script>

<!-- 定义card的from属性 ＆ 自跟踪动作 ＆ 事件布置 ＆ 提示栏初始化 ＆ 事件函数 -->
<script src="/static/JS/Card.js"></script>

<script>
    // 先加载页面内容，再执行Card、背景逻辑
    loadGetHtml().then(() => {
        // 1. 初始化背景
        const bg1 = document.querySelector('.bg-box-for1');
        const bg2 = document.querySelector('.bg-box-for2');
        loadImage(bgList.pc, bg1);
        loadImage(bgList.mobile, bg2);

        // 2. 再加载Card、window相关JS（保证在内容之后执行）
        let s1 = document.createElement('script');
        s1.src = "/static/JS/window.js";
        document.body.appendChild(s1);

        let s2 = document.createElement('script');
        s2.src = "/static/JS/Card.js";
        document.body.appendChild(s2);
    });
</script>
</body>
</html>
